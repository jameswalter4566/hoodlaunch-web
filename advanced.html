<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Advanced — bullish.run</title>
<link rel="icon" href="/logo.png" type="image/png"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/styles.css"/>
</head>
<body>

<aside class="sb">
  <div class="sb-top">
    <a class="sb-brand" href="/"><img src="/logo.png" alt=""/><span>bullish</span></a>
    <button class="sb-toggle" id="sb-toggle" title="Toggle sidebar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="9" y1="4" x2="9" y2="20"/></svg>
    </button>
  </div>
  <nav class="sb-nav">
    <a href="/">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
      <span>Home</span>
    </a>
    <a href="/pulse">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12h4l3-8 4 16 3-8h6"/></svg>
      <span>Pulse</span>
    </a>
    <a href="/advanced" class="active">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="5" height="16" rx="1"/><rect x="10" y="4" width="5" height="16" rx="1"/><rect x="17" y="4" width="4" height="16" rx="1"/></svg>
      <span>Advanced</span>
    </a>
    <a href="/launch" class="sb-launch">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2c4 3 6 7 6 11l-3 3H9l-3-3c0-4 2-8 6-11z"/><circle cx="12" cy="9" r="2"/><path d="M8 17l-2 5 4-2M16 17l2 5-4-2"/></svg>
      <span>Launch</span>
    </a>
  </nav>
</aside>

<div class="main">
  <div class="section-head"><h2>Advanced terminal</h2></div>

  <main class="hl-board">
    <section class="hl-col">
      <header class="hl-col-head">
        <span class="hl-col-title">New</span>
        <input class="hl-col-search" id="hl-search-new" placeholder="Keyword1, Keyword2…"/>
        <span class="hl-col-count" id="hl-count-new">0</span>
        <span class="hl-col-tabs"><b class="on">P1</b><b>P2</b><b>P3</b></span>
      </header>
      <div class="hl-col-body" id="hl-col-new"></div>
    </section>

    <section class="hl-col">
      <header class="hl-col-head">
        <span class="hl-col-title">Graduating</span>
        <input class="hl-col-search" id="hl-search-graduating" placeholder="Keyword1, Keyword2…"/>
        <span class="hl-col-count" id="hl-count-graduating">0</span>
        <span class="hl-col-tabs"><b class="on">P1</b><b>P2</b><b>P3</b></span>
      </header>
      <div class="hl-col-body" id="hl-col-graduating"></div>
    </section>

    <section class="hl-col">
      <header class="hl-col-head">
        <span class="hl-col-title">Graduated</span>
        <input class="hl-col-search" id="hl-search-graduated" placeholder="Keyword1, Keyword2…"/>
        <span class="hl-col-count" id="hl-count-graduated">0</span>
        <span class="hl-col-tabs"><b class="on">P1</b><b>P2</b><b>P3</b></span>
      </header>
      <div class="hl-col-body" id="hl-col-graduated"></div>
    </section>
  </main>
</div>

<script src="/shell.js" defer></script>
<script src="/discover.js" defer></script>
</body>
</html>
