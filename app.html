loading bullish.run…
<script>
// App home = the most recently launched bullish.run coin's page.
fetch('https://hoodlaunchbackend-production.up.railway.app/api/board')
  .then(function (r) { return r.json(); })
  .then(function (b) {
    var all = b.new.concat(b.graduating, b.graduated);
    if (!all.length) { location.replace('/launch'); return; }
    all.sort(function (x, y) { return new Date(y.created_at) - new Date(x.created_at); });
    location.replace('/coin/' + all[0].address);
  });
</script>
