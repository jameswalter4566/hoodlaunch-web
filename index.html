<!DOCTYPE html>
<html class="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tradeonbags — Discover</title>
<link rel="icon" href="/logo.png" type="image/png"/>
<link href="https://api.fontshare.com/v2/css?f[]=switzer@400,500,600,700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/styles.css"/>
</head>
<body class="hl-page">

<header class="hl-topbar">
  <a class="hl-brand" href="/">
    <img src="/logo.png" alt="Tradeonbags"/>
    <span class="hl-brand-text">Tradeonbags<small>LAUNCH. TRADE. EARN.</small></span>
  </a>
  <nav class="hl-topnav">
    <a href="/" class="hl-active">Discover</a>
    <a href="/launch">Launch</a>
  </nav>
  <div class="hl-topbar-right"><a class="hl-topbar-launch" href="/launch">🚀 Launch</a></div>
</header>

<main class="hl-board">
  <section class="hl-col">
    <header class="hl-col-head">
      <span class="hl-col-title">New</span>
      <input class="hl-col-search" id="hl-search-new" placeholder="Keyword1, Keyword2…"/>
      <span class="hl-col-count" id="hl-count-new">0</span>
      <span class="hl-col-tabs"><b class="on">P1</b><b>P2</b><b>P3</b></span>
    </header>
    <div class="hl-col-body" id="hl-col-new"></div>
  </section>

  <section class="hl-col">
    <header class="hl-col-head">
      <span class="hl-col-title">Graduating</span>
      <input class="hl-col-search" id="hl-search-graduating" placeholder="Keyword1, Keyword2…"/>
      <span class="hl-col-count" id="hl-count-graduating">0</span>
      <span class="hl-col-tabs"><b class="on">P1</b><b>P2</b><b>P3</b></span>
    </header>
    <div class="hl-col-body" id="hl-col-graduating"></div>
  </section>

  <section class="hl-col">
    <header class="hl-col-head">
      <span class="hl-col-title">Graduated</span>
      <input class="hl-col-search" id="hl-search-graduated" placeholder="Keyword1, Keyword2…"/>
      <span class="hl-col-count" id="hl-count-graduated">0</span>
      <span class="hl-col-tabs"><b class="on">P1</b><b>P2</b><b>P3</b></span>
    </header>
    <div class="hl-col-body" id="hl-col-graduated"></div>
  </section>
</main>

<script src="/discover.js" defer></script>
</body>
</html>
