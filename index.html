<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tradeonbags — Launch and trade Robinhood Chain coins</title>
<link rel="icon" href="/logo.png" type="image/png"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/styles.css"/>
</head>
<body>

<aside class="sb">
  <div class="sb-top">
    <a class="sb-brand" href="/"><img src="/logo.png" alt=""/><span>Tradeonbags</span></a>
    <button class="sb-toggle" id="sb-toggle" title="Toggle sidebar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="9" y1="4" x2="9" y2="20"/></svg>
    </button>
  </div>
  <nav class="sb-nav">
    <a href="/" class="active">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
      <span>Home</span>
    </a>
    <a href="/advanced">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="5" height="16" rx="1"/><rect x="10" y="4" width="5" height="16" rx="1"/><rect x="17" y="4" width="4" height="16" rx="1"/></svg>
      <span>Advanced</span>
    </a>
    <a href="/launch">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2c4 3 6 7 6 11l-3 3H9l-3-3c0-4 2-8 6-11z"/><circle cx="12" cy="9" r="2"/><path d="M8 17l-2 5 4-2M16 17l2 5-4-2"/></svg>
      <span>Launch</span>
    </a>
  </nav>
  <a class="sb-create" href="/launch"><span>Create coin</span></a>
</aside>

<div class="main">
  <div class="searchbar"><input id="home-search" placeholder="Search for coins..."/></div>

  <div class="section-head">
    <h2>Explore coins</h2>
    <div class="tabs" id="home-tabs">
      <button class="tab on" data-bucket="all">🔥 All</button>
      <button class="tab" data-bucket="new">🌱 New</button>
      <button class="tab" data-bucket="graduating">📈 Graduating</button>
      <button class="tab" data-bucket="graduated">🎓 Graduated</button>
    </div>
  </div>

  <div class="grid" id="home-grid"></div>
</div>

<script src="/shell.js" defer></script>
<script src="/home.js" defer></script>
</body>
</html>
