<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Profile — bullish.run</title>
<link rel="icon" href="/logo.png" type="image/png"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/styles.css"/>
</head>
<body>

<aside class="sb">
  <div class="sb-top">
    <a class="sb-brand" href="/"><img src="/logo.png" alt=""/><span>bullish</span></a>
    <button class="sb-toggle" id="sb-toggle" title="Toggle sidebar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="9" y1="4" x2="9" y2="20"/></svg>
    </button>
  </div>
  <nav class="sb-nav">
    <a href="/app">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
      <span>Home</span>
    </a>
    <a href="/pulse">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12h4l3-8 4 16 3-8h6"/></svg>
      <span>Pulse</span>
    </a>
    <a href="/launch" class="sb-launch">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2c4 3 6 7 6 11l-3 3H9l-3-3c0-4 2-8 6-11z"/><circle cx="12" cy="9" r="2"/><path d="M8 17l-2 5 4-2M16 17l2 5-4-2"/></svg>
      <span>Launch</span>
    </a>
  </nav>
</aside>

<div class="main">
  <div class="pf-wrap">
    <div class="pf-head">
      <div class="pf-avatar" id="pf-avatar"></div>
      <div>
        <div class="pf-name" id="pf-name">Not logged in</div>
        <div class="pf-sub" id="pf-sub">Log in with Phantom to see your launches and claim fees</div>
      </div>
    </div>

    <div class="pf-earn" id="pf-earn" hidden>
      <div class="pf-earn-box">
        <span>Unclaimed fees</span>
        <b id="pf-unclaimed">—</b>
        <small>bridged to your Phantom as SOL</small>
      </div>
      <div class="pf-earn-box">
        <span>Your launches</span>
        <b id="pf-count">0</b>
      </div>
    </div>

    <h3 class="pf-h3" id="pf-launches-h" hidden>Your launches</h3>
    <div class="pf-launches" id="pf-launches"></div>

    <div class="pf-empty" id="pf-empty">
      <button class="hl-cta" id="pf-login" style="max-width:260px">Log in with Phantom</button>
    </div>
  </div>
</div>

<script>window.PRIVY_APP_ID="";</script>
<script src="/auth.js" defer></script>
<script src="/shell.js" defer></script>
<script src="/profile.js" defer></script>
</body>
</html>
