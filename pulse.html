<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pulse — bullish.run</title>
<link rel="icon" href="/logo.png" type="image/png"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/styles.css"/>
</head>
<body>

<aside class="sb">
  <div class="sb-top">
    <a class="sb-brand" href="/"><img src="/logo.png" alt=""/><span>bullish</span></a>
    <button class="sb-toggle" id="sb-toggle" title="Toggle sidebar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="9" y1="4" x2="9" y2="20"/></svg>
    </button>
  </div>
  <nav class="sb-nav">
    <a href="/">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
      <span>Home</span>
    </a>
    <a href="/pulse" class="active">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12h4l3-8 4 16 3-8h6"/></svg>
      <span>Pulse</span>
    </a>
    <a href="/advanced">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="5" height="16" rx="1"/><rect x="10" y="4" width="5" height="16" rx="1"/><rect x="17" y="4" width="4" height="16" rx="1"/></svg>
      <span>Advanced</span>
    </a>
    <a href="/launch">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2c4 3 6 7 6 11l-3 3H9l-3-3c0-4 2-8 6-11z"/><circle cx="12" cy="9" r="2"/><path d="M8 17l-2 5 4-2M16 17l2 5-4-2"/></svg>
      <span>Launch</span>
    </a>
  </nav>
  <a class="sb-create" href="/launch"><span>Create coin</span></a>
</aside>

<div class="main pl-wrap">
  <div class="pl-topbar">
    <span class="pl-title">Pulse</span>
    <div class="mkt-toggle" id="mkt-toggle">
      <button data-mkt="robinhood" class="on">Robinhood</button>
      <button data-mkt="solana">Solana</button>
    </div>
    <span class="pl-sub" id="pl-updated">chain-wide · live</span>
    <button class="pl-filters-btn" id="pl-filters-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
      Filters <span id="pl-filter-count"></span>
    </button>
  </div>

  <div class="pl-board">
    <section class="pl-col">
      <header class="pl-col-head"><span>New Pairs</span><i id="pl-count-newPairs">0</i></header>
      <div class="pl-col-body" id="pl-col-newPairs"></div>
    </section>
    <section class="pl-col">
      <header class="pl-col-head"><span>Final Stretch</span><i id="pl-count-finalStretch">0</i></header>
      <div class="pl-col-body" id="pl-col-finalStretch"></div>
    </section>
    <section class="pl-col">
      <header class="pl-col-head"><span>Migrated</span><i id="pl-count-migrated">0</i></header>
      <div class="pl-col-body" id="pl-col-migrated"></div>
    </section>
  </div>
</div>

<div class="pl-modal" id="pl-modal" hidden>
  <div class="pl-modal-card">
    <div class="pl-modal-head">
      <b>Filters</b>
      <button class="pl-reset" id="pl-reset">⟲ Reset</button>
      <button class="pl-x" id="pl-close">✕</button>
    </div>

    <div class="pl-modal-sec">
      <div class="pl-sec-title">LAUNCHPAD</div>
      <div class="pl-chiprow" id="pl-pads"></div>
    </div>

    <div class="pl-modal-sec">
      <div class="pl-sec-title">MAX AGE (MINUTES)</div>
      <input class="pl-in" id="pl-age" type="number" min="0" placeholder="Any"/>
      <div class="pl-chiprow pl-presets" data-for="pl-age">
        <button data-v="5">5m</button><button data-v="15">15m</button><button data-v="30">30m</button><button data-v="60">1h</button><button data-v="360">6h</button><button data-v="1440">24h</button>
      </div>
    </div>

    <div class="pl-modal-sec">
      <div class="pl-sec-title">LIQUIDITY (USD)</div>
      <input class="pl-in" id="pl-liq" type="number" min="0" placeholder="$ Min"/>
      <div class="pl-chiprow pl-presets" data-for="pl-liq">
        <button data-v="1000">$1.0K+</button><button data-v="5000">$5.0K+</button><button data-v="10000">$10.0K+</button><button data-v="50000">$50.0K+</button>
      </div>
    </div>

    <div class="pl-modal-sec">
      <div class="pl-sec-title">24H VOLUME (USD)</div>
      <input class="pl-in" id="pl-vol" type="number" min="0" placeholder="$ Min"/>
      <div class="pl-chiprow pl-presets" data-for="pl-vol">
        <button data-v="1000">$1.0K+</button><button data-v="10000">$10.0K+</button><button data-v="50000">$50.0K+</button><button data-v="100000">$100.0K+</button>
      </div>
    </div>

    <div class="pl-modal-sec">
      <div class="pl-sec-title">MARKET CAP (USD)</div>
      <div class="pl-minmax">
        <input class="pl-in" id="pl-mc-min" type="number" min="0" placeholder="$ Min"/>
        <input class="pl-in" id="pl-mc-max" type="number" min="0" placeholder="$ Max"/>
      </div>
    </div>

    <div class="pl-modal-foot">
      <span id="pl-filter-note">No filters</span>
      <button class="pl-cancel" id="pl-cancel">Cancel</button>
      <button class="pl-apply" id="pl-apply">Apply Filters</button>
    </div>
  </div>
</div>

<script src="/shell.js" defer></script>
<script src="/pulse.js" defer></script>
</body>
</html>
