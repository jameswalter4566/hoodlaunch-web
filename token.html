<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Token — bullish.run</title>
<link rel="icon" href="/logo.png" type="image/png"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/styles.css"/>
<script src="https://unpkg.com/lightweight-charts@4.2.2/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>

<aside class="sb">
  <div class="sb-top">
    <a class="sb-brand" href="/"><img src="/logo.png" alt=""/><span>bullish</span></a>
    <button class="sb-toggle" id="sb-toggle" title="Toggle sidebar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="9" y1="4" x2="9" y2="20"/></svg>
    </button>
  </div>
  <nav class="sb-nav">
    <a href="/">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
      <span>Home</span>
    </a>
    <a href="/pulse">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12h4l3-8 4 16 3-8h6"/></svg>
      <span>Pulse</span>
    </a>
    <a href="/advanced">      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="5" height="16" rx="1"/><rect x="10" y="4" width="5" height="16" rx="1"/><rect x="17" y="4" width="4" height="16" rx="1"/></svg>
      <span>Advanced</span>
    </a>
    <a href="/launch" class="sb-launch">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2c4 3 6 7 6 11l-3 3H9l-3-3c0-4 2-8 6-11z"/><circle cx="12" cy="9" r="2"/><path d="M8 17l-2 5 4-2M16 17l2 5-4-2"/></svg>
      <span>Launch</span>
    </a>
  </nav>
</aside>

<div class="main tk-wrap">
  <div class="tk-topbar">
    <div class="tk-search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
      <input id="tk-search" placeholder="Search for tokens..."/>
    </div>
  </div>

  <div class="tk-layout">
    <aside class="tk-list">
      <div class="tk-list-tabs" id="tk-list-tabs">
        <button class="tk-list-tab on" data-bucket="new">New</button>
        <button class="tk-list-tab" data-bucket="graduating">Graduating</button>
        <button class="tk-list-tab" data-bucket="graduated">Graduated</button>
      </div>
      <div class="tk-list-body" id="tk-list-body"></div>
    </aside>

    <section class="tk-center">
      <div class="tk-head">
        <div class="tk-head-id">
          <div class="tk-head-img" id="tk-img"></div>
          <div>
            <div class="tk-head-sym" id="tk-sym">—</div>
            <div class="tk-head-name" id="tk-name"></div>
          </div>
          <span class="tk-head-ca" id="tk-ca" title="Copy contract address"></span>
        </div>
        <div class="tk-stats">
          <div class="tk-stat"><span>Market cap</span><b class="big" id="tk-mc">—</b></div>
          <div class="tk-stat"><span>Price</span><b id="tk-price">—</b></div>
          <div class="tk-stat"><span>24H change</span><b id="tk-chg">—</b></div>
          <div class="tk-stat"><span>24H Vol.</span><b id="tk-vol">—</b></div>
          <div class="tk-stat"><span>Holders</span><b id="tk-holders">—</b></div>
          <div class="tk-stat"><span>Graduation</span><b id="tk-grad">—</b></div>
        </div>
      </div>

      <div class="tk-chartbar" id="tk-tfbar">
        <button class="tk-tf" data-i="60">1m</button>
        <button class="tk-tf on" data-i="300">5m</button>
        <button class="tk-tf" data-i="900">15m</button>
        <button class="tk-tf" data-i="3600">1h</button>
      </div>
      <div class="tk-chart" id="tk-chart"><div class="tk-chart-empty" id="tk-chart-empty">No trades yet — the chart draws with the first swap.</div></div>

      <div class="tk-tabs">
        <button class="tk-tab on">Swaps</button>
      </div>
      <div class="tk-table-wrap">
        <table class="tk-table">
          <thead><tr><th>Time</th><th>Side</th><th>USD</th><th>Tokens</th><th>Trader</th><th>Tx</th></tr></thead>
          <tbody id="tk-swaps"></tbody>
        </table>
      </div>
    </section>

    <aside class="tk-trade">
      <div class="tk-bs">
        <button class="buy on" id="tk-buy-tab">Buy</button>
        <button class="sell" id="tk-sell-tab">Sell</button>
      </div>
      <div class="tk-amount">
        <input id="tk-amt" type="number" min="0" placeholder="$0"/>
        <span id="tk-amt-note">Enter amount</span>
      </div>
      <div class="tk-presets" id="tk-presets">
        <button data-usd="10">$10</button>
        <button data-usd="100">$100</button>
        <button data-usd="500">$500</button>
        <button data-usd="1000">$1000</button>
      </div>
      <div class="tk-avail" id="tk-avail"></div>
      <button class="tk-cta" id="tk-cta">Connect Phantom</button>
      <div class="tk-status" id="tk-status"></div>

      <div class="tk-about">
        <h3 id="tk-about-title">About</h3>
        <p id="tk-about-desc">—</p>
        <div class="socials" id="tk-socials"></div>
      </div>

      <div class="tk-tfchips" id="tk-chips">
        <div class="tk-tfchip"><span>5M</span><b id="tk-chip-5m">—</b></div>
        <div class="tk-tfchip"><span>1H</span><b id="tk-chip-1h">—</b></div>
        <div class="tk-tfchip"><span>1D</span><b id="tk-chip-1d">—</b></div>
        <div class="tk-tfchip"><span>🎓</span><b id="tk-chip-grad">—</b></div>
      </div>

      <div class="tk-flow">
        <div class="tk-flow-row"><b class="g" id="tk-buys">0 buys</b><b class="r" id="tk-sells">0 sells</b></div>
        <div class="tk-bar"><i class="g" id="tk-bar-tx" style="width:50%"></i><i class="r" style="flex:1"></i></div>
        <div class="tk-flow-row"><b class="g" id="tk-bvol">$0 vol.</b><b class="r" id="tk-svol">$0 vol.</b></div>
        <div class="tk-bar"><i class="g" id="tk-bar-vol" style="width:50%"></i><i class="r" style="flex:1"></i></div>
      </div>
    </aside>
  </div>
</div>

<script src="/shell.js" defer></script>
<script src="/token.js" defer></script>
</body>
</html>
